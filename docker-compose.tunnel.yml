# Cloudflare Tunnel sidecar. Merge with the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d
# Copy .env.example to .env, set TUNNEL_TOKEN from Zero Trust → Networks → Tunnels.
# In the tunnel: map flow-api.… and admin-flow.… to http://flow2api:8000 (not the host-mapped port).
# FLOW2API_API_ONLY_HOST blocks the web UI and /api on the API hostname (see src/main.py).

services:
  flow2api:
    environment:
      - FLOW2API_API_ONLY_HOST=${FLOW2API_API_ONLY_HOST:-flow-api.prismacreative.online}
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: flow2api-cloudflared
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - flow2api
    restart: unless-stopped
