version: '3.8'

services:
  # Prebuilt image (UI may be older than your git). Build app + agent-gateway from source:
  #   merge docker-compose.local-build.yml (see that file; tags flow2api:local, flow2api-agent-gateway:local)
  flow2api:
    image: ghcr.io/thesmallhancat/flow2api:latest
    container_name: flow2api
    ports:
      - "38000:8000"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./config/setting.toml:/app/config/setting.toml
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
