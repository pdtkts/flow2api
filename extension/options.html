<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flow2API Captcha Worker Settings</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fa;
      color: #111827;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px;
    }
    .panel {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }
    p {
      color: #4b5563;
      line-height: 1.5;
    }
    label {
      display: block;
      margin: 16px 0 8px;
      font-weight: 600;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
    }
    button {
      margin-top: 18px;
      border: 0;
      border-radius: 10px;
      background: #111827;
      color: #fff;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: #6b7280;
    }
    .status {
      margin-top: 12px;
      min-height: 20px;
      font-size: 13px;
      color: #065f46;
    }
    code {
      background: #f3f4f6;
      border-radius: 6px;
      padding: 1px 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Flow2API Captcha Worker</h1>
      <p>Assign a dedicated route key to this browser instance so Flow2API can send captcha requests for the matching account to this exact worker.</p>

      <label for="routeKey">Route Key</label>
      <input id="routeKey" type="text" placeholder="e.g. 9223">

      <label for="clientLabel">Client Label</label>
      <input id="clientLabel" type="text" placeholder="e.g. browser-9223">

      <label for="serverUrl">WebSocket URL</label>
      <input id="serverUrl" type="text" placeholder="ws://127.0.0.1:8000/captcha_ws">

      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="Paste backend API Key here">

      <label for="managedApiKeyId">Managed API Key ID (optional)</label>
      <input id="managedApiKeyId" type="text" placeholder="e.g. 12 (for managed-key isolation)">

      <button id="saveBtn" type="button">Save</button>
      <button id="reconnectBtn" type="button" style="margin-left:8px;background:#1f2937;">Reconnect Now</button>
      <button id="testBtn" type="button" style="margin-left:8px;background:#374151;">Test Token</button>
      <div class="status" id="status"></div>
      <div class="hint" id="runtimeStatus">Connection status: unknown</div>
      <div class="hint">Set the API Key first, then use the same <code>Route Key</code> in the admin token settings (e.g. 9223 to 9223).</div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
