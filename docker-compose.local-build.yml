# Build from this repo (not pre-pulled only):
#   flow2api:local      — current frontend (Dockerfile) + backend
#   flow2api-agent-gateway:local — current src/agent_gateway (Dockerfile.agent-gateway)
#
# The base docker-compose.yml still pulls ghcr.io/...:latest for flow2api unless you merge this file.
# agent-gateway already has a build: in docker-compose.agent-gateway.yml; this file pins a local
# image tag so you always rebuild from your git checkout with --build.
#
#   docker compose -f docker-compose.yml -f docker-compose.agent-gateway.yml -f docker-compose.local-build.yml build --no-cache
#   docker compose -f docker-compose.yml -f docker-compose.agent-gateway.yml -f docker-compose.local-build.yml up -d
#
# + tunnel (same TUNNEL_TOKEN):
#   ... -f docker-compose.tunnel.yml -f docker-compose.agent-gateway.tunnel.yml up -d

services:
  flow2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: flow2api:local

  agent-gateway:
    build:
      context: .
      dockerfile: Dockerfile.agent-gateway
    image: flow2api-agent-gateway:local
