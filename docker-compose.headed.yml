version: '3.8'

services:
  flow2api-headed:
    init: true
    build:
      context: .
      dockerfile: Dockerfile.headed
    image: flow2api:headed
    container_name: flow2api-headed
    ports:
      # Host port → container (app listens on server.port in config/setting.toml, default 8000)
      - "${FRONTEND_PORT:-8000}:8000"
      # Host VNC → container x11vnc (VNC_PORT). e.g. FRONTEND_PORT=8080 VNC_HOST_PORT=15900
      - "${VNC_HOST_PORT:-5900}:${VNC_PORT:-5900}"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./config/setting.toml:/app/config/setting.toml
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOW_DOCKER_HEADED_CAPTCHA=true
      - DISPLAY=:99
      # Match your monitor (WxHxDepth) to reduce letterboxing in VNC; e.g. 2560x1440x24
      - XVFB_SCREEN=1920x1080x24
      # VNC to watch headed browser: ENABLE_HEADED_VNC=0 to disable; VNC_PASSWORD recommended
      - ENABLE_HEADED_VNC=false
      - VNC_PORT=${VNC_PORT:-5900}
      - VNC_PASSWORD=${VNC_PASSWORD:-}
    shm_size: ${SHM_SIZE:-2gb}
    restart: unless-stopped
