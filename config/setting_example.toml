[global]
api_key = "han1234"
admin_username = "admin"
admin_password = "admin"

[flow]
labs_base_url = "https://labs.google/fx/api"
api_base_url = "https://aisandbox-pa.googleapis.com/v1"
timeout = 120
max_retries = 3
image_request_timeout = 40
image_timeout_retry_count = 1
image_timeout_retry_delay = 0.8
image_timeout_use_media_proxy_fallback = true
image_prefer_media_proxy = false
image_slot_wait_timeout = 480
image_launch_soft_limit = 20
image_launch_wait_timeout = 480
image_launch_stagger_ms = 0
video_slot_wait_timeout = 480
video_launch_soft_limit = 20
video_launch_wait_timeout = 480
video_launch_stagger_ms = 0
poll_interval = 3.0
max_poll_attempts = 200

[server]
host = "0.0.0.0"
port = 8000

[debug]
enabled = false
log_requests = true
log_responses = true
mask_token = true
# reCAPTCHA-only trace: logs to logs.txt even when enabled=false (no full API request dumps).
recaptcha_trace = false
# Mirror reCAPTCHA trace lines to stdout (useful next to headed Playwright).
recaptcha_console = false
recaptcha_banner = false
recaptcha_phase_timings = false

[proxy]
# Outbound proxy for Flow / sandbox HTTP (optional). Supports http://, https://, socks5://, socks5h:// (DNS via proxy).
# Example: proxy_url = "socks5h://127.0.0.1:1080" — leave proxy_enabled = false until you intend to use it.
proxy_enabled = false
proxy_url = ""

[generation]
image_timeout = 300
video_timeout = 1500

[generation_routing]
extension_generation_enabled = false
extension_generation_fallback_mode = "local_http_on_recaptcha"  # none/local_http_on_recaptcha

[call_logic]
call_mode = "default"  # default=随机轮询策略, polling=顺序轮询策略

[admin]
error_ban_threshold = 3

[cache]
enabled = false
timeout = 7200  # 缓存超时时间(秒), 默认2小时; 设置为0表示不自动删除缓存
# Public base URL for /tmp/... links in API responses. When using Cloudflare Tunnel (or any HTTPS reverse
# proxy), set this to the hostname clients use for the API, e.g. base_url = "https://api.example.com"
base_url = ""   # 缓存文件访问的基础URL, 留空则按请求/本机回退

[captcha]
# 打码方式: extension（默认）| browser | personal | remote_browser | yescaptcha | capmonster | ezcaptcha | capsolver
captcha_method = "extension"
# browser 模式打开的首页：默认 auth/providers（轻量）；有头 Docker 等可改为 https://labs.google/fx/tools/flow
browser_captcha_page_url = "https://labs.google/fx/api/auth/providers"
browser_launch_background = true  # 有头浏览器是否默认后台启动；设为 false 可直接看到窗口
browser_fallback_to_remote_browser = true  # browser 模式失败时是否自动回退到 remote_browser 网关
browser_recaptcha_settle_seconds = 3.0  # reload/clr 就绪后的额外稳态等待
browser_count = 1  # browser 模式的有头浏览器实例数量
personal_project_pool_size = 4  # personal 模式下单个 Token 默认维护的项目池数量（仅影响项目轮换，不决定打码标签页数量）
personal_max_resident_tabs = 5  # personal 模式共享打码标签页上限，所有 Token/project 共用这组 tab
personal_idle_tab_ttl_seconds = 600  # personal 模式标签页空闲回收时间(秒)
extension_queue_wait_timeout_seconds = 20  # extension 模式按 managed key 排队等待 worker 的超时秒数
# --- 第三方 API 打码（仅当 captcha_method 设为对应服务时需要填写）---
yescaptcha_api_key = ""  # YesCaptcha API密钥
yescaptcha_base_url = "https://api.yescaptcha.com"
capmonster_api_key = ""
capmonster_base_url = "https://api.capmonster.cloud"
ezcaptcha_api_key = ""
ezcaptcha_base_url = "https://api.ez-captcha.com"
capsolver_api_key = ""
capsolver_base_url = "https://api.capsolver.com"
# Docker 自建 Agent Gateway: 合并 docker-compose.yml 与 docker-compose.agent.yml
# 见 docs/agent-gateway.md。容器网内填 http://agent-gateway:9080，key 与 GATEWAY_FLOW2API_BEARER 一致
remote_browser_base_url = ""  # 远程有头打码 / Agent Gateway 基地址
remote_browser_api_key = ""   # 远程打码或 Gateway 的 Bearer（与 GATEWAY_FLOW2API_BEARER 相同）
remote_browser_timeout = 60   # 远程有头打码请求超时(秒)
